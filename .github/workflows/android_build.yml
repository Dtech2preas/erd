name: Android CI

on:
  push:
    branches: [ "main", "music-downloader-app-7315293495363157775" ]
  pull_request:
    branches: [ "main", "music-downloader-app-7315293495363157775" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Prepare Debug Artifacts
      run: |
        mkdir -p debug
        cp app/build/outputs/apk/debug/app-debug.apk debug/music-downloader-debug.apk

    - name: Upload Debug Artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: debug/
